<!DOCTYPE html><html>
<head>
<title>DR SUBHAN GFX TOOL PRO</title>
<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  text-align: center;
}
#box {
  margin-top: 60px;
}
.progress {
  width: 80%;
  height: 20px;
  background: #222;
  margin: 20px auto;
}
.bar {
  height: 100%;
  width: 1%;
  background: lime;
}
button {
  padding: 12px;
  font-size: 16px;
  background: red;
  color: white;
  border: none;
  margin-top: 10px;
}
</style>
</head>
<body><div id="box">
<h1>DR SUBHAN GFX TOOL PRO</h1>
<p>Secure Engine v4.3</p>
<button onclick="start()">START INJECTION</button>
</div><script>
function start(){
  let box = document.getElementById("box");

  box.innerHTML = `
    <h2>Initializing...</h2>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <p id="status">Starting...</p>
    <button onclick="tap()">BOOST PROCESS</button>
    <p id="tapCount">Taps: 0</p>
  `;

  let bar = document.getElementById("bar");
  let status = document.getElementById("status");
  let tapText = document.getElementById("tapCount");

  let width = 1;
  let direction = 1;
  let taps = 0;
  let phase = 1;
  let running = true;

  let interval = setInterval(move, 80);

  function move(){
    if(!running) return;

    width += direction;

    if(width >= 100){
      direction = -1;
    }
    if(width <= 20){
      direction = 1;
    }

    bar.style.width = width + "%";

    // Phase 1 → get stuck
    if(phase === 1 && width > 85){
      running = false;
      status.innerText = "⚠️ Error detected! Tap 10 times to fix";
    }
  }

  window.tap = function(){
    taps++;
    tapText.innerText = "Taps: " + taps;

    // Phase 1 unlock
    if(phase === 1 && taps >= 10){
      phase = 2;
      running = true;
      status.innerText = "Fixing... please wait";
    }

    // Phase 2 → stuck again (more evil 😈)
    if(phase === 2 && taps >= 20){
      phase = 3;
      running = true;
      status.innerText = "Final optimization...";
    }

    // Final taps → APRIL FOOL
    if(phase === 3 && taps >= 22){
      document.getElementById("box").innerHTML =
        "<h1>🤡 APRIL FOOL 🤡</h1><p>You really tapped that many times 💀😂</p>";
    }
  }
}
</script></body>
</html>
